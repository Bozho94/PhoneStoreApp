<section class="min-h-screen bg-base-200 px-6 py-10">
  <div class="mx-auto max-w-7xl">
    <div class="mb-8">
      <p class="text-sm font-semibold uppercase tracking-[0.25em] text-primary">Phone Store</p>

      <h1 class="mt-2 text-4xl font-bold text-base-content">Latest Phones</h1>
    </div>

    <p-dataview [value]="visiblePhones" [paginator]="true" [rows]="8">
      <ng-template #header>
        <div class="mb-6 flex flex-col gap-3 md:flex-row">
          <select
            class="select select-bordered w-full md:w-80"
            [(ngModel)]="selectedBrand"
            (ngModelChange)="applyBrandFilter()"
          >
            <option value="">All brands</option>

            @for (brand of brands; track brand) {
              <option [value]="brand">{{ brand }}</option>
            }
          </select>

          <button type="button" class="btn btn-outline" (click)="clearFilter()">
            Clear
          </button>
        </div>
      </ng-template>

      <ng-template #list let-items>
        <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
          @for (phone of items; track phone.id) {
            <article class="card bg-base-100 shadow-xl">
              <figure class="relative h-64 overflow-hidden rounded-t-2xl bg-base-100">
                <div
                  class="absolute inset-0 scale-110 bg-cover bg-center blur-2xl opacity-35"
                  [style.background-image]="'url(' + phone.mainImageUrl + ')'"
                ></div>

                <img
                  [src]="phone.mainImageUrl"
                  [alt]="phone.brand + ' ' + phone.model"
                  class="relative z-10 h-full w-full object-contain"
                />
              </figure>

              <div class="card-body">
                <div>
                  <p class="text-sm text-base-content/60">{{ phone.brand }}</p>
                  <h2 class="card-title">{{ phone.model }}</h2>
                </div>

                <div class="flex items-center justify-between">
                  <span class="text-xl font-bold"> ${{ phone.price }} </span>

                  <span class="badge badge-outline">
                    {{ phone.releaseYear }}
                  </span>
                </div>

                @if (phone.stockQuantity > 0) {
                  <div class="badge badge-success badge-outline">In stock</div>
                } @else {
                  <div class="badge badge-error badge-outline">Out of stock</div>
                }

                <div class="card-actions mt-4">
                  <button class="btn btn-primary w-full" [routerLink]="['/phones', phone.id]">
                    Details
                  </button>
                </div>
              </div>
            </article>
          }
        </div>
      </ng-template>
    </p-dataview>
  </div>
</section>
