<section class="min-h-screen bg-base-200 px-6 py-16">
  <div class="mx-auto max-w-md rounded-3xl bg-base-100 p-8 shadow-md">
    <p class="text-sm font-semibold uppercase tracking-[0.25em] text-primary">
      Create Account
    </p>

    <h1 class="mt-3 text-3xl font-bold">
      Register
    </h1>

    <form class="mt-8 space-y-4" (ngSubmit)="register()">
      <input
        type="text"
        name="fullName"
        placeholder="Full name"
        class="input input-bordered w-full"
        [(ngModel)]="registerData.fullName"
      />

      <input
        type="email"
        name="email"
        placeholder="Email"
        class="input input-bordered w-full"
        [(ngModel)]="registerData.email"
      />

      <input
        type="password"
        name="password"
        placeholder="Password"
        class="input input-bordered w-full"
        [(ngModel)]="registerData.password"
      />

      @if (errorMessage) {
        <p class="text-sm text-error">
          {{ errorMessage }}
        </p>
      }

      <button type="submit" class="btn btn-primary w-full">
        Register
      </button>
    </form>

    <a routerLink="/phones" class="btn btn-ghost mt-4 w-full">
      Back to phones
    </a>
  </div>
</section>
