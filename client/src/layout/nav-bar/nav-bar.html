<nav class="navbar bg-base-100 px-6 shadow-sm">
  <div class="navbar-start">
    <a routerLink="/phones" class="btn btn-ghost text-xl font-bold">
      PhoneStoreApp
    </a>
  </div>

  <div class="navbar-end">
    @if (!authService.currentUser) {
      <form class="flex items-center gap-2" (ngSubmit)="login()">
        <input
          type="email"
          name="email"
          placeholder="Email"
          class="input input-bordered input-sm w-44"
          [(ngModel)]="loginData.email"
        />

        <input
          type="password"
          name="password"
          placeholder="Password"
          class="input input-bordered input-sm w-36"
          [(ngModel)]="loginData.password"
        />

        <button type="submit" class="btn btn-primary btn-sm">
          Login
        </button>

        <a routerLink="/register" class="btn btn-outline btn-sm">
          Register
        </a>
      </form>
    } @else {
      <div class="flex items-center gap-3">
        <span class="hidden text-sm text-base-content/70 sm:inline">
          Hello, {{ authService.currentUser.fullName }}
        </span>

        <button type="button" class="btn btn-outline btn-sm" (click)="logout()">
          Logout
        </button>
      </div>
    }
  </div>
</nav>

@if (errorMessage) {
  <div class="bg-error px-6 py-2 text-sm text-error-content">
    {{ errorMessage }}
  </div>
}
