<section class="min-h-screen bg-base-200 px-4 py-8 sm:px-6 sm:py-10">
  <div class="mx-auto max-w-6xl">
    <div class="mb-6 flex flex-wrap items-center justify-between gap-4">
      <div>
        <p class="text-sm font-semibold uppercase tracking-[0.25em] text-primary">Admin</p>
        <h1 class="text-3xl font-bold sm:text-4xl">Manage phones</h1>
      </div>

      <a routerLink="/admin/phones/create" class="btn btn-primary w-full sm:w-auto">
        Create phone
      </a>
    </div>

    <p-dataview [value]="phones" [paginator]="true" [rows]="8">
      <ng-template #list let-pagePhones>
        <div class="overflow-x-auto rounded-3xl bg-base-100 shadow-sm">
          <table class="table min-w-[42rem]">
            <thead>
              <tr>
                <th>Phone</th>
                <th>Year</th>
                <th>Price</th>
                <th>Stock</th>
                <th class="text-right">Actions</th>
              </tr>
            </thead>

            <tbody>
              @for (phone of pagePhones; track phone.id) {
                <tr>
                  <td>
                    <div class="flex items-center gap-3">
                      <img
                        [src]="phone.mainImageUrl"
                        [alt]="phone.brand + ' ' + phone.model"
                        class="h-14 w-14 rounded-xl bg-base-200 object-contain"
                      />

                      <div>
                        <p class="font-semibold">{{ phone.brand }}</p>
                        <p class="text-sm text-base-content/70">{{ phone.model }}</p>
                      </div>
                    </div>
                  </td>
                  <td>{{ phone.releaseYear }}</td>
                  <td>${{ phone.price }}</td>
                  <td>{{ phone.stockQuantity }}</td>
                  <td class="text-right whitespace-nowrap">
                    <a [routerLink]="['/admin/phones', phone.id, 'edit']" class="btn btn-outline btn-sm mr-2">
                      Edit
                    </a>

                    <button type="button" class="btn btn-error btn-sm" (click)="deletePhone(phone.id)">
                      Delete
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </ng-template>
    </p-dataview>
  </div>
</section>
